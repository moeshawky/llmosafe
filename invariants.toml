# Cross-Module Invariant Tracing (CMIT)
# Human-readable invariants that must hold at module boundaries.
# These are checked by property tests and shadow validators.

# ── Perception Chain: input → sift → memory → kernel ─────────────

[[invariant]]
name = "sift_entropy_bounded"
chain = ["sift"]
description = "Sifter entropy must be in [0, 65535] (u16 range)"
check = "0 <= sifted.raw_entropy() <= 0xFFFF"

[[invariant]]
name = "sift_bias_flag_matches_breakdown"
chain = ["sift"]
description = "has_bias must be true iff at least one bias category scored > 0"
check = "sifted.has_bias() == classifier.is_manipulation"

[[invariant]]
name = "memory_entropy_preserved"
chain = ["sift", "memory"]
description = "Entropy stored in WorkingMemory must match sifter output"
check = "memory.mean_entropy() approximately matches sifted.raw_entropy()"

[[invariant]]
name = "memory_surprise_bounded"
chain = ["sift", "memory"]
description = "Surprise must be non-negative and ≤ surprise_threshold after gating"
check = "0 <= validated.surprise_raw() <= memory.surprise_threshold"

[[invariant]]
name = "kernel_validate_rejects_bias"
chain = ["memory", "kernel"]
description = "Validated synapse with has_bias=true must be rejected"
check = "if validated.has_bias(): validated.validate() == Err(BiasHaloDetected)"

[[invariant]]
name = "kernel_validate_rejects_high_entropy"
chain = ["memory", "kernel"]
description = "Validated synapse with entropy > PRESSURE_THRESHOLD (40000) must be rejected by validate(). STABILITY_THRESHOLD (50000) remains as the Unstable/Halt boundary in stability() and EscalationPolicy."
check = "if validated.raw_entropy() > PRESSURE_THRESHOLD: validated.validate() == Err(CognitiveInstability)"

[[invariant]]
name = "kernel_depth_exceeded"
chain = ["kernel"]
description = "ReasoningLoop must reject steps beyond MAX_STEPS"
check = "loop.next_step(validated) after MAX_STEPS steps returns Err(DepthExceeded)"

# ── Resource Chain: os → body → kernel ──────────────────────────

[[invariant]]
name = "body_entropy_bounded"
chain = ["body"]
description = "raw_entropy() must be in [0, 1000]"
check = "0 <= guard.raw_entropy() <= 1000"

[[invariant]]
name = "body_pressure_bounded"
chain = ["body"]
description = "pressure() must be in [0, 100]"
check = "0 <= guard.pressure() <= 100"

[[invariant]]
name = "body_check_zero_ceiling"
chain = ["body"]
description = "Zero ceiling must always return ResourceExhaustion"
check = "ResourceGuard::new(0).check() == Err(ResourceExhaustion)"

[[invariant]]
name = "body_check_blocking_terminates"
chain = ["body"]
description = "check_blocking_with_max_retries must return within max_retries iterations"
check = "guard.check_blocking_with_max_retries(N) does not hang"

# ── Decision Chain: signals → policy → action ────────────────────

[[invariant]]
name = "policy_halt_overrides_escalate"
chain = ["policy"]
description = "If entropy > halt_entropy, decision must be Halt regardless of bias/surprise/pressure"
check = "if entropy > halt_entropy: decision == Halt"

[[invariant]]
name = "policy_escalate_overrides_warn"
chain = ["policy"]
description = "If entropy >= escalate_entropy, decision severity must be >= Escalate"
check = "if entropy >= escalate_entropy: decision.severity() >= 2"

[[invariant]]
name = "policy_decision_never_upgrades"
chain = ["policy"]
description = "Severity must be monotonic with entropy: increasing entropy never decreases severity"
check = "if e1 >= e2: decide(e1, s, b).severity() >= decide(e2, s, b).severity()"

[[invariant]]
name = "policy_pressure_escalates"
chain = ["policy", "body"]
description = "pressure >= escalate_pressure triggers escalation when no Halt present"
check = "if pressure >= escalate_pressure && entropy < halt_entropy: decision == Escalate"

# ── Typestate Chain: sifted → validated ─────────────────────────

[[invariant]]
name = "typestate_pipeline_order"
chain = ["sift", "memory", "kernel"]
description = "SiftedSynapse → WorkingMemory::update → ValidatedSynapse → ReasoningLoop::next_step must be the only callable path"
check = "Cannot construct ValidatedSynapse without going through WorkingMemory (pub(crate) enforced at compile time)"

# ── Cross-Chain: Decision Consistency ────────────────────────────

[[invariant]]
name = "sifted_vs_resource_entropy"
chain = ["sift", "body"]
description = "Sifter entropy [0,65535] and body entropy [0,1000] operate on different scales. EscalationPolicy entropy thresholds target sifter range. Body entropy relies on pressure_level for gating."
check = "0 <= body.raw_entropy() <= 1000 and 0 <= sifted.raw_entropy() <= 65535 and body.decides_with_pressure via body.rs:228"

[[invariant]]
name = "no_silent_pressure_zone"
chain = ["sift", "memory", "kernel"]
description = "Entropy in [PRESSURE_THRESHOLD, STABILITY_THRESHOLD] must compute Pressure via stability(). debug_assert! fires at validate()/next_step() boundaries when Pressure zone is silent (monitoring gate; full routing deferred to v0.8 CognitivePipeline)"
check = "if raw_entropy >= PRESSURE_THRESHOLD: synapse.stability() >= Pressure"

# ── Pipeline: stage ordering ─────────────────────────────────────

[[invariant]]
name = "pipeline_stages_sequential"
chain = ["pipeline"]
description = "STAGE_SIFT (0x01) through STAGE_MONITOR (0x10) must occupy non-overlapping bits and execute in strict order. A halted stage must not produce subsequent stage bits."
check = "stages_executed is subset of {SIFT, MEMORY, KERNEL, DETECTION, MONITOR} and stage N+1 → stage N is set"

[[invariant]]
name = "pipeline_result_matches_decision"
chain = ["pipeline"]
description = "PipelineResult.decision must be consistent with process() output. Halt implies detection_flags or memory/kernel error; Escalate implies detection active or pressure elevated."
check = "pipeline.process(text).halt_reason().is_some() iff decision.must_halt()"

[[invariant]]
name = "pipeline_reset_full_clears_state"
chain = ["pipeline"]
description = "reset_full() must zero step_count and clear all detector ring buffers."
check = "step_count == 0 after reset_full(); calling process() again produces fresh PipelineResult"

# ── C-ABI arena: handle lifecycle ─────────────────────────────────

[[invariant]]
name = "c_abi_handle_bounds"
chain = ["c_abi"]
description = "llmosafe_create returns handle in [0, 15] on success, usize::MAX on failure. llmosafe_sift_and_process and llmosafe_get_decision return -9 for handles >= 16 or uninitialized slots."
check = "handle < 16 or handle == usize::MAX"

[[invariant]]
name = "c_abi_decision_code_semantics"
chain = ["c_abi"]
description = "0=Proceed, 1=Warn, 2=Escalate. Negative codes: -1=DepthExceeded, -2=CognitiveInstability, -3=BiasHaloDetected, -4=HallucinationDetected, -5=ResourceExhaustion, -6=SelfMemoryExceeded, -7=DeadlineExceeded, -8=Exit, -9=invalid/not_processed."
check = "decision_to_code() mirrors existing llmosafe_check_resources error mapping; llmosafe_get_decision() after destroy returns -9"

[[invariant]]
name = "c_abi_arena_exhaustion"
chain = ["c_abi"]
description = "Arena holds max 16 concurrent pipelines. 17th llmosafe_create() returns usize::MAX."
check = "16 creations succeed, 17th fails"

[[invariant]]
name = "c_abi_sift_and_process_stores_result"
chain = ["c_abi", "pipeline"]
description = "After llmosafe_sift_and_process(handle, ...), llmosafe_get_decision(handle) must return the same code."
check = "let c1 = sift_and_process(h, text); let c2 = get_decision(h); assert_eq!(c1, c2);"

# ── PID Decision Subsystem ──────────────────────────────────────

[[invariant]]
name = "pid_risk_score_bounded"
chain = ["pid"]
description = "compute_pid_score() must return f32 in [0.0, 1.0]"
check = "0.0 <= risk <= 1.0 && risk.is_finite()"

[[invariant]]
name = "pid_dual_integrator_bounded"
chain = ["pid"]
description = "Both acute_entropy and chronic_entropy must be in [0.0, 1.0]"
check = "0.0 <= state.acute_entropy <= 1.0 && 0.0 <= state.chronic_entropy <= 1.0"

[[invariant]]
name = "pid_decision_monotonic"
chain = ["pid"]
description = "Higher RiskScore must produce >= severity decision"
check = "if r1 >= r2: pid_risk_to_decision(r1).severity() >= pid_risk_to_decision(r2).severity()"

[[invariant]]
name = "pid_bias_override"
chain = ["pid"]
description = "When has_bias=true, RiskScore must be >= halt_gain"
check = "if has_bias: risk >= config.halt_gain"

[[invariant]]
name = "pid_anti_windup"
chain = ["pid"]
description = "Integrator update freezes when risk >= halt_gain"
check = "if risk >= halt_gain: integrators unchanged (or bled at 0.999x)"

[[invariant]]
name = "pid_sidechain_bounded"
chain = ["pid"]
description = "All gain multipliers from modulate_gains() must be in [0.5, 2.0]"
check = "eff.kp in [0.5*kp, 2.0*kp] and similarly for ki_fast, ki_slow, kd, kf"

[[invariant]]
name = "pid_sidechain_clean"
chain = ["pid"]
description = "When no detection flags are set, gains return to identity (1.0x)"
check = "flags == 0 → all effective gains equal config gains"

[[invariant]]
name = "pid_reset_full_clears"
chain = ["pid", "pipeline"]
description = "reset_full() must zero cumulative_entropy (both acute and chronic) and prev_pressure_norm"
check = "pid_state.acute_entropy == 0 && pid_state.chronic_entropy == 0 && pid_state.prev_pressure_norm == 0"

[[invariant]]
name = "pid_full_through"
chain = ["pid", "pipeline"]
description = "All decisions route through process_ctrl() — no legacy process_inner() fallback"
check = "CognitivePipeline::process_ctrl is the only production decision path"
